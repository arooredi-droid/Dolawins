<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dolawins Admin Dashboard</title>
<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:20px;
}
h1{
    color:#2196F3;
}
table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
}
th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}
th{
    background:#2196F3;
    color:white;
}
tr:nth-child(even){
    background:#f9f9f9;
}
button{
    padding:6px 12px;
    margin:2px;
    cursor:pointer;
}
.approve{
    background:green;
    color:white;
    border:none;
}
.reject{
    background:red;
    color:white;
    border:none;
}
</style>
</head>
<body>

<h1>Dolawins Admin Dashboard</h1>

<table>
<thead>
<tr>
<th>Username</th>
<th>Password</th>
<th>Points</th>
<th>Pending Rewards</th>
<th>Subscription</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="users"></tbody>
</table>

<script>
fetch("/api/users")
.then(r => r.json())
.then(users => {
  const tbody = document.getElementById("users");
  tbody.innerHTML = "";
  users.forEach(user => {
const row = `
<tr>
<td>${user.username}</td>
<td>${user.password}</td>
<td>${user.points || 0}</td>
<td>${user.pendingRewards || 0}</td>
<td>${user.subscription ? "Active" : "Inactive"}</td>
<td>
<button class="approve">Approve</button>
<button class="reject">Reject</button>
</td>
</tr>
`;

body.insertAdjacentHTML("beforeend", row);
  });
});
</script>

</body>
</html>
