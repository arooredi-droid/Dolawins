<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dolawins Admin Dashboard</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
}
table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
}
th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}
th{
    background:#2196F3;
    color:#fff;
}
button{
    padding:6px 12px;
    border:none;
    background:#28a745;
    color:#fff;
    cursor:pointer;
    border-radius:4px;
}
button:hover{
    background:#218838;
}
</style>

</head>

<body>

<h2>Dolawins Admin Dashboard</h2>

<table>
<thead>
<tr>
<th>Phone</th>
<th>Points</th>
<th>Pending Rewards</th>
<th>Subscription</th>
<th>Action</th>
</tr>
</thead>

<tbody id="users"></tbody>

</table>

<script>

fetch("/api/users")
.then(res=>res.json())
.then(users=>{

let html="";

Object.entries(users).forEach(([username,user])=>{
html+=`
<tr>
<td>${user.phone || user.username}</td>
<td>${user.points || 0}</td>
<td>${user.pendingRewards || 0}</td>
<td>${user.subscription}</td>
<td>
<button onclick="approve('${username}')">
Approve
</button>
</td>
</tr>
`;

});

document.getElementById("users").innerHTML=html;

});

async function approve(username){

await fetch("/admin/approve/"+username,{
method:"POST"
});

alert("Subscription approved.");

location.reload();

}

</script>

</body>
</html>
