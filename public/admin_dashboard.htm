<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dolawins Admin Dashboard</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    padding:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

th{
    background:#2196F3;
    color:white;
}

button{
    background:green;
    color:white;
    border:none;
    padding:6px 12px;
    cursor:pointer;
    border-radius:4px;
}
</style>
</head>

<body>

<h2>Dolawins Admin Dashboard</h2>

<table>
<thead>
<tr>
<th>Phone</th>
<th>Points</th>
<th>Pending Rewards</th>
<th>Subscription</th>
<th>Action</th>
</tr>
</thead>

<tbody id="users"></tbody>

</table>

<script>

fetch("/api/users")
.then(res=>res.json())
.then(users=>{

let html="";

Object.values(users).forEach(user=>{

html += `
<tr>
<td>${user.phone || user.username}</td>
<td>${user.points || 0}</td>
<td>${user.pendingRewards || 0}</td>
<td>${user.subscription}</td>
<td>
<button onclick="approve('${user.username}')">
Approve
</button>
</td>
</tr>
`;

});

document.getElementById("users").innerHTML = html;

});

async function approve(username){

await fetch("/admin/approve/" + username,{
method:"POST"
});

location.reload();

}

</script>

</body>
</html>
