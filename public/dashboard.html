<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dolawins Admin Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

header{
    background:#0b5ed7;
    color:#fff;
    padding:15px;
    text-align:center;
    font-size:24px;
}

.container{
    padding:20px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.number{
    font-size:40px;
    font-weight:bold;
    color:#0b5ed7;
}

button{
    background:#0b5ed7;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:6px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#084298;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th,
table td{
    border:1px solid #ddd;
    padding:10px;
    text-align:left;
}

table th{
    background:#0b5ed7;
    color:white;
}
</style>
</head>

<body>

<header>
Dolawins Admin Dashboard
</header>

<div class="container">

<div class="card">
<h2>Total Users</h2>
<div class="number" id="users">0</div>
</div>

<div class="card">
<h2>Quick Actions</h2>

<button onclick="location.reload()">
Refresh Dashboard
</button>

<button onclick="alert('Users page coming next')">
Manage Users
</button>

<button onclick="alert('Deposits page coming next')">
Deposits
</button>

<button onclick="alert('Withdrawals page coming next')">
Withdrawals
</button>

</div>

<div class="card">
<h2>Registered Users</h2>

<table>
<thead>
<tr>
<th>Username</th>
</tr>
</thead>

<tbody id="userTable">
</tbody>

</table>

</div>

</div>

<script>

fetch("/admin/stats")
.then(res=>res.json())
.then(data=>{

document.getElementById("users").innerHTML=data.totalUsers;

if(data.users){

let html="";

data.users.forEach(function(user){

html+=`
<tr>
<td>${user}</td>
</tr>
`;

});

document.getElementById("userTable").innerHTML=html;

}

});

</script>

</body>
</html>
