<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dolawins Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b132b;
color:white;
}

.header{
background:linear-gradient(90deg,#14b8a6,#0ea5e9);
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
box-shadow:0 2px 10px rgba(0,0,0,.3);
}

.welcome{
text-align:center;
margin-top:20px;
font-size:22px;
font-weight:bold;
}

.container{
width:90%;
max-width:420px;
margin:20px auto;
}

.card{
background:#1d274a;
border-radius:15px;
padding:20px;
margin-bottom:15px;
text-align:center;
box-shadow:0 0 15px rgba(255,215,0,.2);
}

.card h3{
margin-bottom:10px;
font-size:20px;
}

.amount{
font-size:32px;
font-weight:bold;
color:gold;
}

button{
width:100%;
padding:16px;
margin-top:12px;
border:none;
border-radius:10px;
background:gold;
color:black;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ffcc00;
}

.footer{
margin-top:30px;
text-align:center;
font-size:14px;
color:#cccccc;
padding-bottom:20px;
}

</style>

</head>

<body>

<div class="header">
🎡 DOLAWINS
</div>

<div class="welcome">
Welcome, <span id="username">Player</span> 👋
</div>

<div class="container">

<div class="card">
<h3>💰 Pending Rewards</h3>
<div class="amount" id="money">KES 0</div>
</div>

<div class="card">
<h3>⭐ Total Points</h3>
<div class="amount" id="points">0</div>
</div>

<button onclick="location.href='spin.html'">🎡 Spin & Win</button>

<button onclick="location.href='convert.html'">⭐ Convert Rewards</button>

<button onclick="location.href='history.html'">📜 Reward History</button>

<button onclick="location.href='winners.html'">🏆 Community</button>

<button onclick="location.href='subscribe.html'">📱 Subscribe</button>

<button onclick="logout()">🚪 Logout</button>

</div>

<div class="footer">
Dolawins © 2026
</div>

<script>

const USER_ID=localStorage.getItem("currentUser");

if(!USER_ID){
window.location.href="login.html";
}

document.getElementById("username").innerHTML=USER_ID;

async function loadDashboard(){

const response=await fetch("/api/user/"+USER_ID);
const user=await response.json();

document.getElementById("money").innerHTML="KES "+(user.pendingRewards||0);
document.getElementById("points").innerHTML=user.points||0;

}

function logout(){

localStorage.removeItem("currentUser");

window.location.href="login.html";

}

loadDashboard();

</script>

</body>
</html>
