<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dolawins Community</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b132b;
color:#fff;
}

.header{
background:#14b8a6;
padding:18px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
max-width:420px;
margin:20px auto;
padding:15px;
}

.card{
background:#1d274a;
padding:20px;
border-radius:12px;
margin-bottom:15px;
text-align:center;
box-shadow:0 0 10px rgba(255,215,0,.4);
}

.icon{
font-size:45px;
}

.title{
font-size:20px;
margin-top:10px;
}

.number{
font-size:38px;
font-weight:bold;
color:gold;
margin-top:12px;
}

.note{
margin-top:20px;
font-size:13px;
color:#cccccc;
text-align:center;
}

button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:8px;
background:gold;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ffcc00;
}
</style>
</head>

<body>

<div class="header">
🏆 Dolawins Community
</div>

<div class="container">

<div class="card">
<div class="icon">👥</div>
<div class="title">Community Members</div>
<div class="number">2,000+</div>
</div>

<div class="card">
<div class="icon">🎉</div>
<div class="title">Estimated Winners</div>
<div class="number">1,500+</div>
</div>

<div class="card">
<div class="icon">🎡</div>
<div class="title">Estimated Spins</div>
<div class="number">25,000+</div>
</div>

<div class="card">
<div class="icon">⭐</div>
<div class="title">Happy Players</div>
<div class="number">1,800+</div>
</div>

<div class="note">
Community figures shown above are estimated and displayed for promotional purposes.
</div>

<button onclick="window.location.href='dashboard.html'">
⬅ Back to Dashboard
</button>

</div>

</body>
</html>
